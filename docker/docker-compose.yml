services:
  # MySQL 主库
  mysql-master:
    image: mysql:8
    container_name: ts-template-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW
    networks:
      - ts-template-network

  # MySQL 从库
  mysql-slave:
    image: mysql:8
    container_name: ts-template-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
    command: --server-id=2 --relay-log=relay-bin
    networks:
      - ts-template-network
    depends_on:
      - mysql-master

  # Redis 主节点
  redis-master:
    image: redis:7-alpine
    container_name: ts-template-redis-master
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    command: redis-server --appendonly yes
    networks:
      - ts-template-network

  # Redis 从节点
  redis-slave:
    image: redis:7-alpine
    container_name: ts-template-redis-slave
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --replicaof redis-master 6379
    networks:
      - ts-template-network
    depends_on:
      - redis-master

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: ts-template-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: mydb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - ts-template-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ts-template-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ts-template-network

volumes:
  mysql-master-data:
  mysql-slave-data:
  redis-master-data:
  mongodb-data:
  rabbitmq-data:

networks:
  ts-template-network:
    driver: bridge